<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Fundación Estudiantil Christel House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,700;1,400&family=DM+Sans:wght=300;400;500;600&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --verde:      #1B3A6B;
      --verde-claro:#2a5298;
      --dorado:     #F26522;
      --crema:      #f5f7fa;
      --oscuro:     #0f1f3d;
      --gris:       #5a6a80;
      --blanco:     #ffffff;
      --radio:      14px;
      --sombra:     0 8px 32px rgba(27,58,107,.13);
      --error:      #e53e3e;
      --success:    #38a169;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      color: var(--oscuro);
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 6vw;
      background: rgba(245,247,250,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(27,58,107,.12);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: var(--verde);
      text-decoration: none; font-weight: 700;
    }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--oscuro);
      font-size: .875rem; font-weight: 500; opacity: .75; transition: opacity .2s;
    }
    .nav-links a:hover { opacity: 1; }
    .btn-nav {
      background: var(--verde); color: var(--blanco) !important;
      opacity: 1 !important; padding: 9px 22px; border-radius: 50px;
      font-weight: 600 !important; transition: background .2s, transform .15s !important;
    }
    .btn-nav:hover { background: var(--verde-claro); transform: translateY(-1px); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      padding: 120px 6vw 80px;
      background:
        radial-gradient(ellipse 80% 60% at 70% 50%, rgba(42,82,152,.15) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(242,101,34,.10) 0%, transparent 60%),
        var(--crema);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; right: -180px; top: 50%;
      transform: translateY(-50%); width: 640px; height: 640px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42,82,152,.13), transparent 70%);
      pointer-events: none;
    }
    .hero-inner { max-width: 680px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(27,58,107,.1); color: var(--verde);
      font-size: .78rem; font-weight: 600; letter-spacing: .05em;
      text-transform: uppercase; padding: 6px 14px; border-radius: 50px;
      margin-bottom: 24px; animation: fadeUp .6s ease both;
    }
    .hero-badge::before { content: '●'; font-size: .5rem; }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 5vw, 4rem); line-height: 1.15;
      color: var(--oscuro); animation: fadeUp .6s .1s ease both;
    }
    .hero h1 em { font-style: italic; color: var(--verde); }
    .hero p {
      margin-top: 18px; font-size: 1.05rem; line-height: 1.7;
      color: var(--gris); max-width: 520px; animation: fadeUp .6s .2s ease both;
    }
    .hero-ctas {
      margin-top: 36px; display: flex; gap: 14px; flex-wrap: wrap;
      animation: fadeUp .6s .3s ease both;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--verde); color: var(--blanco);
      padding: 14px 32px; border-radius: 50px;
      font-weight: 600; font-size: .95rem; text-decoration: none;
      box-shadow: 0 4px 20px rgba(27,58,107,.35);
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn-primary:hover { background: var(--verde-claro); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(27,58,107,.4); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      border: 2px solid rgba(27,58,107,.3); color: var(--verde);
      padding: 13px 28px; border-radius: 50px; font-weight: 600; font-size: .95rem;
      text-decoration: none; transition: border-color .2s, background .2s;
    }
    .btn-secondary:hover { border-color: var(--verde); background: rgba(27,58,107,.05); }

    /* ── STATS ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: var(--verde); color: var(--blanco);
    }
    .stat-item {
      padding: 28px 24px; text-align: center;
      border-right: 1px solid rgba(255,255,255,.15);
      animation: fadeUp .6s ease both;
    }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; }
    .stat-label { font-size: .8rem; opacity: .75; margin-top: 4px; letter-spacing: .04em; text-transform: uppercase; }

    /* ── SECCIONES ── */
    section { padding: 90px 6vw; }
    .bg-alt { background: #edf1f8; }
    h2.section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 3vw, 2.5rem); color: var(--oscuro); margin-bottom: 10px;
    }
    .section-sub { color: var(--gris); font-size: .95rem; max-width: 520px; line-height: 1.6; margin-bottom: 48px; }

    .nosotros-container { max-width: 760px; margin: 0 auto; text-align
