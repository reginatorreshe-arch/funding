<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Fundación Estudiantil Christel House</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --verde:      #1B3A6B;
      --verde-claro:#2a5298;
      --dorado:     #F26522;
      --crema:      #f5f7fa;
      --oscuro:     #0f1f3d;
      --gris:       #5a6a80;
      --blanco:     #ffffff;
      --radio:      14px;
      --sombra:     0 8px 32px rgba(27,58,107,.13);
      --error:      #e53e3e;
      --success:    #38a169;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--crema);
      color: var(--oscuro);
      overflow-x: hidden;
    }
 
    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 6vw;
      background: rgba(245,247,250,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(27,58,107,.12);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .ch-logo-svg { height: 44px; width: auto; }
    .nav-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: var(--verde);
      font-weight: 700; line-height: 1.2;
      display: flex; flex-direction: column;
    }
    .nav-logo-text span:last-child { font-size: .72rem; font-weight: 400; opacity: .6; letter-spacing: .04em; }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--oscuro);
      font-size: .875rem; font-weight: 500; opacity: .75; transition: opacity .2s;
    }
    .nav-links a:hover { opacity: 1; }
    .btn-nav {
      background: var(--verde); color: var(--blanco) !important;
      opacity: 1 !important; padding: 9px 22px; border-radius: 50px;
      font-weight: 600 !important; transition: background .2s, transform .15s !important;
    }
    .btn-nav:hover { background: var(--verde-claro); transform: translateY(-1px); }
 
    /* ── HERO FULL-BLEED ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Slideshow de imágenes de fondo */
    .hero-slides {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
